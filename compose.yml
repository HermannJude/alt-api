version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: internal-tools-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-internal_tools}
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgresql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal-tools-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: internal-tools-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-8081}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal-tools-net

  api:
    build:
      context: api
      dockerfile: Dockerfile
      target: development
    container_name: internal-tools-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./api:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-dev123}@postgres:5432/${POSTGRES_DATABASE:-internal_tools}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal-tools-net

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  internal-tools-net:
    driver: bridge
